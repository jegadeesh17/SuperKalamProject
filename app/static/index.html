<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperKalam — UPSC Mains Answer Evaluator</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements for Premium Look -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-pen-nib"></i>
                <h1>SuperKalam</h1>
            </div>
            <p class="subtitle">Agentic UPSC Mains Answer Evaluator</p>
        </header>

        <main>
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="evaluate">
                    <i class="fa-solid fa-check-double"></i> Evaluate My Answer
                </button>
                <button class="mode-btn" data-mode="model-answer">
                    <i class="fa-solid fa-book-open"></i> Show Model Answer
                </button>
            </div>

            <div class="glass-panel">
                <form id="evaluation-form">
                    
                    <div class="form-group">
                        <label for="question-input">UPSC Mains Question</label>
                        <textarea id="question-input" rows="3" placeholder="Paste a UPSC Mains question here... (e.g. 'Discuss the role of women's self-help groups...')"></textarea>
                    </div>

                    <div class="form-group" id="answer-group">
                        <label for="answer-input">Your Answer</label>
                        <textarea id="answer-input" rows="8" placeholder="Type your 150-250 word answer here..."></textarea>
                        <div class="word-count"><span id="word-count-val">0</span> words</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="language-select">Feedback Language</label>
                            <div class="select-wrapper">
                                <select id="language-select">
                                    <option value="en">English</option>
                                    <option value="hi">Hindi (हिन्दी)</option>
                                    <option value="ta">Tamil (தமிழ்)</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>
                        <div class="form-group half action-btn-group">
                            <button type="submit" id="submit-btn" class="primary-btn">
                                <span>Evaluate Answer</span>
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Loading State -->
                <div id="loading-state" class="hidden">
                    <div class="spinner"></div>
                    <p id="loading-text">Analyzing your answer against UPSC standards...</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>

                <!-- Error State -->
                <div id="error-state" class="hidden alert warning">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <p id="error-msg">An error occurred.</p>
                </div>
            </div>

            <!-- Results Container -->
            <div id="results-container" class="hidden">
                <!-- Evaluation Results -->
                <div id="evaluate-result" class="hidden">
                    <div class="score-cards">
                        <div class="score-card primary-score">
                            <h3>Overall Score</h3>
                            <div class="score-circle">
                                <svg viewBox="0 0 36 36" class="circular-chart">
                                    <path class="circle-bg"
                                      d="M18 2.0845
                                        a 15.9155 15.9155 0 0 1 0 31.831
                                        a 15.9155 15.9155 0 0 1 0 -31.831"
                                    />
                                    <path class="circle" id="overall-circle"
                                      stroke-dasharray="0, 100"
                                      d="M18 2.0845
                                        a 15.9155 15.9155 0 0 1 0 31.831
                                        a 15.9155 15.9155 0 0 1 0 -31.831"
                                    />
                                    <text x="18" y="21" id="overall-val" class="percentage">0.0</text>
                                </svg>
                            </div>
                            <p>out of 10</p>
                        </div>
                        
                        <div class="score-card details">
                            <h3>Rubric Breakdown</h3>
                            <div class="rubric-bars" id="rubric-bars">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel feedback-panel mt-2">
                        <h3><i class="fa-solid fa-user-graduate"></i> Mentor Feedback</h3>
                        <div id="mentor-feedback" class="feedback-content">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Model Answer Results -->
                <div id="model-answer-result" class="hidden glass-panel mt-2">
                    <div class="result-header">
                        <h3><i class="fa-solid fa-file-contract"></i> Model Answer</h3>
                        <div class="badges">
                            <span class="badge" id="ma-topic">Topic</span>
                            <span class="badge" id="ma-year">Year</span>
                        </div>
                    </div>
                    <div class="matched-q">
                        <strong>Matched PYQ:</strong> <span id="ma-matched-q">...</span>
                    </div>
                    <div class="model-content" id="ma-content">
                        <!-- Populated by JS -->
                    </div>
                    <div class="key-points-section">
                        <h4>Key Points to Cover</h4>
                        <ul id="ma-key-points">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                </div>
            </div>
            
        </main>
        
        <footer>
            <p>SuperKalam Agentic Evaluator Demo</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
